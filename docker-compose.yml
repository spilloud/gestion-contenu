services:
    nginx:
        build:
            context: ./docker/nginx
        container_name: contenu_nginx
        volumes:
            - ./docker/nginx/conf/default.conf:/etc/nginx/conf.d/default.conf
            - .:/var/www:rw
            - ./var/log/nginx:/var/log/nginx/:rw
        expose:
            - 80
        restart: on-failure
        depends_on:
            - php
        networks:
            - contenu_internal
            - osmose_shared
        deploy:
            resources:
                limits:
                    cpus: '1'
                    memory: 512M

    php:
        build:
            context: ./docker/php
        container_name: contenu_php
        restart: on-failure
        environment:
            - APP_ENV=prod
            - APP_DEBUG=0
            - TRUSTED_PROXIES=private_ranges
            - MAILER_FROM=${MAILER_FROM:-noreply@osmose-marketing.ch}
            - POSTGRES_HOST=contenu_postgres
            - POSTGRES_DB=contenu
            - POSTGRES_USER=contenu_user
            - POSTGRES_PASSWORD=${CONTENU_DB_PASSWORD:-ChangeMeInProduction}
        depends_on:
            - postgres
        volumes:
            - ./docker/php/conf/php.ini:/usr/local/etc/php/php.ini
            - ./docker/php/conf/php-fpm.d/www.conf:/usr/local/etc/php-fpm.d/zzz-custom.conf
            - .:/var/www
        networks:
            - contenu_internal
        deploy:
            resources:
                limits:
                    cpus: '1'
                    memory: 512M

    postgres:
        build:
            context: ./docker/postgres
        container_name: contenu_postgres
        restart: on-failure
        environment:
            - POSTGRES_DB=contenu
            - POSTGRES_USER=contenu_user
            - POSTGRES_PASSWORD=${CONTENU_DB_PASSWORD:-ChangeMeInProduction}
        volumes:
            - contenu_db_data:/var/lib/postgresql:rw
        networks:
            - contenu_internal
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 512M

networks:
    contenu_internal:
        driver: bridge
    osmose_shared:
        external: true

volumes:
    contenu_db_data:
