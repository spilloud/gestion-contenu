security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: /login
                default_target_path: app_dashboard
                always_use_default_target_path: true
                enable_csrf: true
                csrf_token_id: authenticate
                failure_path: app_login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 1209600
                path: /
                always_remember_me: true
            logout:
                path: app_logout
                target: app_login
                invalidate_session: true
                delete_cookies:
                    REMEMBERME: { path: /, domain: null }

    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/mot-de-passe-oublie, roles: PUBLIC_ACCESS }
        - { path: ^/reinitialiser-mot-de-passe, roles: PUBLIC_ACCESS }
        - { path: ^/api/ai, roles: PUBLIC_ACCESS }
        - { path: ^/agenda, roles: ROLE_CLIENT }
        - { path: ^/admin/users, roles: ROLE_ADMIN }
        - { path: ^/admin, roles: ROLE_USER, allow_if: "not is_granted('ROLE_CLIENT')" }
        - { path: ^/, roles: ROLE_USER, allow_if: "not is_granted('ROLE_CLIENT')" }
